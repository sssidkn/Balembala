services:
  api-gateway:
    build: api-gateway
    container_name: api-gateway
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - notifications-service
      - contacts-templates-service


  kafka1:
    image: confluentinc/cp-kafka:latest
    hostname: kafka1
    expose:
      - "8092"
    environment:
      KAFKA_BROKER_ID: 1
      CLUSTER_ID: "XbRg4VXaQZq4d5w5l1Sf3g"
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka1:9093,2@kafka2:9095,3@kafka3:9097"

      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT"
      KAFKA_LISTENERS: "INTERNAL://:8092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka1:8092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
    volumes:
      - kafka-data1:/var/lib/kafka/data


  kafka2:
    image: confluentinc/cp-kafka:latest
    hostname: kafka2
    expose:
      - "8094"
    environment:
      KAFKA_BROKER_ID: 2
      CLUSTER_ID: "XbRg4VXaQZq4d5w5l1Sf3g"
      KAFKA_NODE_ID: 2
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka1:9093,2@kafka2:9095,3@kafka3:9097"

      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT"
      KAFKA_LISTENERS: "INTERNAL://:8094,CONTROLLER://:9095"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka2:8094"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
    volumes:
      - kafka-data2:/var/lib/kafka/data

  kafka3:
    image: confluentinc/cp-kafka:latest
    hostname: kafka3
    expose:
      - "8096"
    environment:
      KAFKA_BROKER_ID: 3
      CLUSTER_ID: "XbRg4VXaQZq4d5w5l1Sf3g"
      KAFKA_NODE_ID: 3
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka1:9093,2@kafka2:9095,3@kafka3:9097"

      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT"
      KAFKA_LISTENERS: "INTERNAL://:8096,CONTROLLER://:9097"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka3:8096"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
    volumes:
      - kafka-data3:/var/lib/kafka/data

  kafka-init:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - kafka1
      - kafka2
      - kafka3
    command: >
      bash -ec '
        BOOTSTRAP="kafka1:8092,kafka2:8094,kafka3:8096";
        until kafka-topics --bootstrap-server "$$BOOTSTRAP" --list >/dev/null 2>&1; do
          echo "Waiting for Kafka...";
          sleep 5;
        done;
        for item in notifications:3:3 retry:3:3 dlq:3:3; do
          IFS=: read -r name partitions replication <<< "$$item";
          kafka-topics --bootstrap-server "$$BOOTSTRAP" --create --if-not-exists --topic "$$name" --partitions "$$partitions" --replication-factor "$$replication";
        done;
        kafka-topics --bootstrap-server "$$BOOTSTRAP" --list;
        touch /tmp/kafka-ready;
        tail -f /dev/null
      '
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/kafka-ready"]
      interval: 10s
      timeout: 5s
      retries: 12

  notifications-service:
    build:
      context: notifications-service
      dockerfile: Dockerfile
    container_name: notifications-service
    expose:
      - "9010"
      - "8083"
    environment:
      GRPC_PORT: "9010"
      HTTP_PORT: "8083"
      REPORT_SERVER: "contacts-templates-service:9080"
      BROKERS: "kafka1:8092,kafka2:8094,kafka3:8096"
      KAFKA_SECURITY_PROTOCOL: "plaintext"
      REDIS_HOST: cache
      REDIS_PORT: 6379
      CHANNEL_SIZE: 1000
      CHANNEL_NUMBER: 3
      BATCH_SIZE: 100
    volumes:
      - notifications-service-data:/var/lib/notifications-service/data
    depends_on:
      kafka1:
        condition: service_started
      kafka2:
        condition: service_started
      kafka3:
        condition: service_started
      kafka-init:
        condition: service_healthy
      redis:
        condition: service_started

  #  kafka-ui:
