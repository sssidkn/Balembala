  #      KAFKA_CLUSTERS_0_PROPERTIES_SSL_TRUSTSTORE_PASSWORD: "123456"
  #      KAFKA_CLUSTERS_0_PROPERTIES_SSL_KEYSTORE_LOCATION: "/keystore.jks"
  #      KAFKA_CLUSTERS_0_PROPERTIES_SSL_KEYSTORE_PASSWORD: "123456"
  #      KAFKA_CLUSTERS_0_PROPERTIES_SSL_KEY_PASSWORD: "123456"
  #    volumes:
  #      - ./certs/kafka.truststore.jks:/truststore.jks:ro
  #      - ./certs/kafka1.keystore.jks:/keystore.jks:ro
  #    depends_on:
  #      - kafka1
  #      - kafka2
  #      - kafka3
  #      - redis
  #      - contacts-templates-service
  #      - sender-service

  reportDB:
    image: postgres:17
    container_name: reportDB
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: reportDB

    volumes:
      - reportDB:/var/lib/postgresql/data
      - ./contacts-templates-service/migrations/docker-init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U root -d reportDB" ]
      interval: 5s
      timeout: 5s
      retries: 5

  contacts-templates-service:
    build:
      context: contacts-templates-service
      dockerfile: Dockerfile
    container_name: report
    environment:
      REST_PORT: 8082
      GRPC_PORT: 9080
      REDIS_HOST: cache
      REDIS_PORT: 6379
      POSTGRES_HOST: reportDB
      POSTGRES_PORT: 5432
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: reportDB
    expose:
      - "8082"
      - "9080"
    depends_on:
      reportDB:
        condition: service_healthy
      redis:
        condition: service_started

  redis:
    image: redis:latest
    container_name: cache
    command: redis-server --loglevel verbose
    expose:
      - "6379"
    volumes:
      - redis_data:/data

  sender-service:
    build:
      context: sender-service
      dockerfile: Dockerfile
    container_name: sender-service
    environment:
      KAFKA_BROKERS: "kafka1:8092,kafka2:8094,kafka3:8096"
      KAFKA_SECURITY_PROTOCOL: "plaintext"
      KAFKA_INPUT_TOPIC: "notifications"
      KAFKA_RETRY_TOPIC: "retry"
      USERNAME: "notificat2025@mail.ru"
      PASSWORD: "Lm1gNygA98dCedEfx1Fc"
    volumes:
      - sender-service-data:/var/lib/sender-service/data
    depends_on:
      kafka1:
        condition: service_started
      kafka2:
        condition: service_started
      kafka3:
        condition: service_started
      kafka-init:
        condition: service_healthy

  auth-service:
    build:
      context: auth-service
      dockerfile: Dockerfile
    container_name: auth
    expose:
      - "8081"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASS: 1234
      POSTGRES_HOST: authDB
      POSTGRES_DB: authDB
      POSTGRES_PORT: 5432
      GRPC_PORT: 9090
      HTTP_PORT: 8081
      SECRET: my_secret_key
      JWT_SECRET: my_secret_key
    depends_on:
      authDb:
        condition: service_healthy

  authDb:
    image: postgres:17
    container_name: authDB
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: authDB
    volumes:
      - authDB:/var/lib/postgresql/data
      - ./auth-service/migrations/docker-init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U root -d authDB" ]
      interval: 5s
      timeout: 5s
      retries: 5

  retry-processor-service:
    build:
      context: retry-processor-service
      dockerfile: Dockerfile
    container_name: retry-processor-service
    environment:
      KAFKA_BROKERS: "kafka1:8092,kafka2:8094,kafka3:8096"
      KAFKA_SECURITY_PROTOCOL: "plaintext"
      KAFKA_NOTIFICATIONS_TOPIC: "notifications"
      KAFKA_RETRY_TOPIC: "retry"
      KAFKA_DLQ_TOPIC: "dlq"
      MAX_RETRIES: 3
      PARTITIONS_COUNT: 3
      CHANNEL_SIZE: 100
    volumes:
      - retry-processor-service-data:/var/lib/retry-processor-service/data
    depends_on:
      kafka1:
        condition: service_started
      kafka2:
        condition: service_started
      kafka3:
        condition: service_started
      kafka-init:
        condition: service_healthy
      notifications-service:
        condition: service_started
      sender-service:
        condition: service_started

volumes:
  kafka-data1:
  kafka-data2:
  kafka-data3:
  notifications-service-data:
  reportDB:
  redis_data:
  sender-service-data:
  authDB:
  retry-processor-service-data:
